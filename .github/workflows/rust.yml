name: CRS Release

on:
  schedule:
    # 9 AM UTC on every Monday
    - cron: "0 9 * * Mon"
  workflow_dispatch:
    inputs:
      pre-release:
        type: boolean
        description: Mark as "Pre-Release"
        required: false
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
      fail-fast: false
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build CRS Standalone Binary
        # Explicitly using --release as requested
        run: cargo build --release --target=${{ matrix.platform.target }} --verbose

      - name: Prepare Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.platform.target }}/release/crs target/crs-${{ matrix.platform.target }}
        
      - name: Prepare Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.platform.target }}\release\crs.exe target\crs-${{ matrix.platform.target }}.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crs-${{ matrix.platform.target }}
          path: target/crs-${{ matrix.platform.target }}*

  build-wasm:
    name: Build WASM (WASI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build CRS WASM
        run: cargo build --release --target wasm32-wasip1

      - name: Rename WASM Binary
        run: cp target/wasm32-wasip1/release/crs.wasm target/crs-wasm32-wasip1.wasm

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crs-wasm
          path: target/crs-wasm32-wasip1.wasm

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-wasm]
    if: github.event_name != 'schedule' || github.repository == 'memecoder12345678/CRS-Programming-Language'
    steps:
      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: bin
          pattern: crs-*
          merge-multiple: true

      - name: List Binaries for Verification
        run: ls -lh bin/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_number }}
          IS_PRE_RELEASE: ${{ github.event.inputs.pre-release }}
        run: |
          if [[ "${IS_PRE_RELEASE}" == "false" ]]; then
            RELEASE_TYPE="Release"
            PRERELEASE_FLAG=""
          else
            RELEASE_TYPE="Pre-Release"
            PRERELEASE_FLAG="--prerelease"
          fi
          
          DATE_STR=$(date '+%Y-%m-%d')
          # Build a unique tag if triggered manually, otherwise use the git tag
          if [[ "${github.event_name}" == "workflow_dispatch" ]]; then
            VERSION_TAG="v$DATE_STR-build$RUN_ID"
          else
            VERSION_TAG="$TAG_NAME"
          fi
          
          gh release create "$VERSION_TAG" \
              --repo="$GITHUB_REPOSITORY" \
              --title="CRS $RELEASE_TYPE ($DATE_STR)" \
              --notes "### CRS Standalone Executables
              
              This release contains the highly optimized CRS Virtual Machine binaries.
              
              **Quick Start:**
              - Download the binary corresponding to your OS.
              - Run your CRS script: \`./crs run script.crs\`
              - View debug assembly: \`./crs dis script.crs\`
              
              *Built with Rust (Stable) in Release mode.*" \
              --generate-notes \
              $PRERELEASE_FLAG \
              bin/crs-*
