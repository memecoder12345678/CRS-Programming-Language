name: CRS Continuous Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      pre-release:
        type: boolean
        description: Mark as Pre-Release
        required: false
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
      fail-fast: false
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build CRS Standalone Binary
        run: cargo build --release --target=${{ matrix.platform.target }} --verbose

      - name: Prepare Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.platform.target }}/release/crs target/crs-${{ matrix.platform.target }}
        
      - name: Prepare Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.platform.target }}\release\crs.exe target\crs-${{ matrix.platform.target }}.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crs-${{ matrix.platform.target }}
          path: target/crs-${{ matrix.platform.target }}*

  build-wasm:
    name: Build WASM (WASI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build CRS WASM
        run: cargo build --release --target wasm32-wasip1

      - name: Rename WASM Binary
        run: cp target/wasm32-wasip1/release/crs.wasm target/crs-wasm32-wasip1.wasm

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crs-wasm
          path: target/crs-wasm32-wasip1.wasm

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-wasm]
    if: github.repository == 'memecoder12345678/CRS-Programming-Language'
    steps:
      - name: Download Compiled Binaries
        uses: actions/download-artifact@v4
        with:
          path: bin
          pattern: crs-*
          merge-multiple: true

      - name: Generate Version Metadata
        id: vars
        run: |
          echo "tag=v$(date +'%Y.%m.%d')-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.vars.outputs.tag }}
          BUILD_DATE: ${{ steps.vars.outputs.date }}
        run: |
          # Automated builds from push are marked as pre-release by default
          PRERELEASE_FLAG="--prerelease"
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.pre-release }}" == "false" ]]; then
            PRERELEASE_FLAG=""
          fi

          gh release create "$VERSION_TAG" \
              --repo="$GITHUB_REPOSITORY" \
              --title="CRS Build $VERSION_TAG" \
              --notes "### CRS Runtime Details
              
              This release contains the latest standalone binaries for the CRS Programming Language.
              
              - **Version Build:** $VERSION_TAG
              - **Timestamp:** $BUILD_DATE
              
              **Usage:**
              Download the binary for your platform and execute:
              \`\`\`bash
              crs run <file.crs> [entry]
              \`\`\`" \
              $PRERELEASE_FLAG \
              bin/crs-*
